# Cloud iOS build for BC Billing (no Mac required).
# Builds the Capacitor iOS shell on Codemagic's Mac instances and uploads to
# App Store Connect / TestFlight automatically.
#
# Before the first run, in the Codemagic UI:
#   1. Connect this GitHub repo.
#   2. Teams → Integrations → App Store Connect → add an API key
#      (App Store Connect → Users and Access → Integrations → generate a key
#       with the "App Manager" role). Name the integration exactly:
#         BC_BILLING_APP_STORE_KEY
#   3. Make sure the bundle id  cloud.bcbilling.app  exists as an App in
#      App Store Connect first (see MOBILE_APP.md).
workflows:
  ios-app-store:
    name: BC Billing iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BC_BILLING_APP_STORE_KEY
    environment:
      vars:
        # Capacitor 8 uses Swift Package Manager (no CocoaPods / no .xcworkspace).
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "cloud.bcbilling.app"
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci || npm install
      - name: Generate the iOS native project
        script: |
          set -e
          # A fresh clone has no ios/ — scaffold it. Capacitor 8 wires up Swift
          # Package Manager, so there are no pods to install.
          if [ ! -d "ios/App" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Set up code signing (create cert + profile if missing)
        script: |
          keychain initialize
          # Creates a distribution certificate and an App Store provisioning
          # profile for the bundle id automatically when none exist yet.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build the signed .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically. Flip to true to also send it
        # into App Store review automatically once you're confident.
        submit_to_testflight: true
        submit_to_app_store: false
